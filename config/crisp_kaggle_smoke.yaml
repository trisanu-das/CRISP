# CRISP Kaggle pilot configuration
# Target hardware: Kaggle Notebooks, GPU T4 x2 (2x 16GB, pick this over the
# single P100 option: P100 lacks Tensor Cores so fp16 gives no speedup there).
# This is a feasibility pilot, not the full experimental design in
# config/crisp_7b.yaml: single seed, short runs, small model. Use this to get
# a directional answer to the Section 5.3 falsification test (CRISP vs.
# GRPO(k=1)) cheaply, then move to rented/full-scale GPU time for the real
# multi-seed, multi-baseline, multi-ablation run.

experiment:
  name: crisp_kaggle_pilot
  seed: 42
  output_dir: /kaggle/working/runs/crisp_kaggle_pilot
  project: crisp
  tags:
    - crisp
    - rlvr
    - self-distillation
    - kaggle-pilot

model:
  name: Qwen/Qwen2.5-Math-1.5B-Instruct
  trust_remote_code: true
  dtype: auto              # auto-detects fp16 on T4/P100, bf16 on Ampere+
  gradient_checkpointing: true
  use_flash_attention_2: false   # T4/P100 can't use it anyway; loader now falls back to sdpa safely even if this were true
  max_position_embeddings: 4096
  load_in_4bit: true        # QLoRA; needed to fit comfortably in 16GB per GPU

lora:
  enabled: true
  r: 8                      # down from 64; adapter memory matters less than base model at this scale
  lora_alpha: 16
  lora_dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  modules_to_save: []

optimizer:
  name: adamw_torch
  lr: 1.0e-5
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.1
  max_grad_norm: 1.0
  mixed_precision: fp16      # T4/P100 have no bf16 tensor-core support

training:
  total_steps: 5          # pilot scale, not the full 1000-2000
  warmup_steps: 10
  global_batch_size: 64      # reachable via accumulation without needing 512-1024
  micro_batch_size: 2        # per GPU; T4 x2 runs two of these in parallel via DataParallel/Accelerate
  gradient_accumulation_steps: 16
  log_every: 1
  save_every: 25             # checkpoint often, Kaggle sessions cap at ~9-12 hours
  eval_every: 5
  resume_from_checkpoint: null
  dataloader_num_workers: 2  # Kaggle gives limited CPU cores; don't over-subscribe
  packing: false

rollout:
  max_new_tokens: 256        # down from 1024
  temperature: 0.7
  top_p: 1.0
  top_k: 0
  do_sample: true
  repetition_penalty: 1.0
  num_return_sequences: 1
  stop_on_eos: true
  use_vllm: false            # not actually wired to anything in this codebase; left explicit for clarity

crisp:
  enabled: true
  lambda_max: 1.0
  lambda_schedule: cosine
  lambda_floor: 0.0
  correctness_gate: true
  correctness_gate_mode: wrong_only
  pc_grad: true
  entropy_bonus: 0.01
  clip_ratio: 0.2
  advantage_norm: global
  advantage_eps: 1.0e-8
  reward_centering: true
  reward_scaling: standardize
  teacher_student_shared_weights: true
  teacher_context_mode: privileged_prefix
  student_context_mode: prompt_only

loss_weights:
  rl: 1.0
  sd: 1.0
  entropy: 0.01

reward:
  name: math_verify
  type: binary
  parse_format: latex
  treat_parse_fail_as_wrong: true
  normalize_answers: true
  answer_extraction:
    method: boxed
    fallback_patterns:
      - final answer
      - answer is
      - therefore

data:
  train_datasets:
    - name: AI-MO/NuminaMath-CoT
      split: train
      weight: 1.0
  eval_datasets:
    aime2024:
      source: Maxwell-Jia/AIME_2024
      split: train
    aime2025:
      source: math-ai/aime25
      split: test
    math500:
      source: hendrycks/competition_math
      split: test
    # humaneval intentionally omitted from the pilot: its code-execution eval
    # is comparatively slow without batched generation infra, and isn't
    # needed for the CRISP-vs-GRPO(k=1) falsification test. Add back once
    # running on rented/full-scale GPU time.
  shuffle_seed: 42
  max_prompt_length: 512     # down from 4096; now actually enforced (see training/crisp_step.py)
  max_answer_length: 512     # down from 2048; now actually enforced
  train_subset: 2000         # cap training set size so an epoch fits a pilot session
  eval_subset: null

prompt_templates:
  student: |
    Solve the following problem step by step.
    Put your final answer inside \boxed{}.

    Problem: {problem}

    Solution:

  teacher: |
    Solve the following problem step by step.
    Put your final answer inside \boxed{}.

    Problem: {problem}

    The correct answer is: {answer}

    Now write a complete step-by-step solution:

logging:
  backend: wandb            # requires a WANDB_API_KEY Kaggle secret; set to 'none' if you'd rather skip it for the pilot
  wandb_entity: null
  wandb_project: crisp
  log_model: false
  log_artifacts: true
  metrics:
    - reward/mean
    - reward/std
    - loss/rl
    - loss/sd
    - advantage/variance
    - gradient/cos_rl_sd
    - policy/entropy
    - efficiency/tokens_generated
    - efficiency/tokens_cumulative
    - efficiency/lambda

checkpointing:
  save_last: true
  save_best: true
  save_optimizer: false      # skip for the pilot; optimizer states roughly double checkpoint size, and /kaggle/working is capped around 20GB
  save_lora_only: true
  keep_last_n: 2

evaluation:
  seeds: [42]                # single seed for the pilot, not [42, 123, 999]
  eval_subset_size: 20       # cap per-benchmark eval set size; without this a full MATH-500 (500 problems) pass takes hours without vLLM
  eval_batch_size: 8         # batched generation instead of one example at a time
  generation_max_new_tokens: 256
  deterministic: true
  report:
    - pass@1_mean
    - pass@1_std
    - tokens_mean
    - tokens_per_correct

baselines:
  grpo_k1:
    enabled: true            # the critical comparison (Section 5.3 falsification test)
    k: 1
  grpo_k8:
    enabled: false           # not code-enforced yet, but: skip this for the pilot regardless.
                              # k=8 rollouts without vLLM's batching will burn session time fast.
  reinforce_pp:
    enabled: true
  opsd:
    enabled: true

hardware:
  expected_vram_gb: 16
  preferred_gpus: Kaggle-T4x2
  minimum_gpus: Kaggle-T4x1

notes:
  - This is a feasibility pilot, not the full experimental design. Treat any
    results as directional signal, not a substitute for config/crisp_7b.yaml's
    multi-seed, multi-ablation run on rented/full-scale hardware.
  - Single seed here; Section 5.6 of the README requires 3 seeds minimum for
    a real result, this config intentionally does not meet that bar yet.
  - Remember to enable "Internet" in the Kaggle notebook's session settings
    before pip install / dataset downloads will work.
  - AIME source datasets (Maxwell-Jia/AIME_2024, math-ai/aime25) were not
    exhaustively schema-verified here; spot-check field names resolve
    correctly (data/build_dataset.py's normalizer is now case-insensitive,
    which should cover common casing differences) before trusting results.
